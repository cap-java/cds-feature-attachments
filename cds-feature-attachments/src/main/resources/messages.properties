AttachmentSizeExceeded = File size exceeds the limit of {0}.
CompositionMaxItemsExceeded = The maximum number of items ({0}) for {1} has been exceeded.
CompositionMinItemsNotMet = The minimum number of items ({0}) for {1} has not been met.
# Apps can override messages per entity/property using this pattern:
# CompositionMaxItemsExceeded_{EntityName}_{compositionName} = Custom message ({0} is the limit, {1} is the property).
# CompositionMinItemsNotMet_{EntityName}_{compositionName} = Custom message ({0} is the limit, {1} is the property).
# Example override for unit tests:
CompositionMaxItemsExceeded_RootTable_attachments = RootTable: too many attachments (max {0}).