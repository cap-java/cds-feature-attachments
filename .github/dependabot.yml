version: 2
updates:
  - package-ecosystem: maven
    directories:
      - "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
