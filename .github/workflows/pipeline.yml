name: Reusable Workflow

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

env:
  MAVEN_VERSION: '3.9.12'

on:
  workflow_call:

jobs:
  spotless:
    name: Spotless Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: sapmachine
          cache: maven

      - name: Set up Maven
        uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
        with:
          maven-version: ${{ env.MAVEN_VERSION }}

      - name: Spotless Check
        run: mvn spotless:check -Dspotless.check.skip=false -B -ntp

  integration-tests:
    name: ITests (Java ${{ matrix.java-version }}, ${{ matrix.auth-method }}, ${{ matrix.hyperscaler }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        java-version: [ 17, 21 ]
        auth-method: [ basic, mtls ]
        hyperscaler: [ AWS, AZURE, GCP ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.sha || github.sha }}

      - name: Bind CF Services
        uses: ./.github/actions/cf-bind
        with:
          cf-api: ${{ secrets[format('CF_API_{0}', matrix.hyperscaler)] }}
          cf-username: ${{ secrets.CF_USERNAME }}
          cf-password: ${{ secrets.CF_PASSWORD }}
          cf-org: ${{ secrets[format('CF_ORG_{0}', matrix.hyperscaler)] }}
          cf-space: ${{ secrets[format('CF_SPACE_{0}', matrix.hyperscaler)] }}
          auth-method: ${{ matrix.auth-method }}

      - name: Integration Tests
        uses: ./.github/actions/integration-tests
        with:
          java-version: ${{ matrix.java-version }}
          maven-version: ${{ env.MAVEN_VERSION }}

  sonarqube-scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.sha || github.sha }}

      - name: Bind CF Services
        uses: ./.github/actions/cf-bind
        with:
          cf-api: ${{ secrets.CF_API_AWS }}
          cf-username: ${{ secrets.CF_USERNAME }}
          cf-password: ${{ secrets.CF_PASSWORD }}
          cf-org: ${{ secrets.CF_ORG_AWS }}
          cf-space: ${{ secrets.CF_SPACE_AWS }}
          auth-method: basic

      - name: SonarQube Scan
        uses: ./.github/actions/scan-with-sonar
        with:
          java-version: 17
          maven-version: ${{ env.MAVEN_VERSION }}
          sonarq-token: ${{ secrets.SONARQ_TOKEN }}
          github-token: ${{ secrets.GH_TOKEN }}

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.sha || github.sha }}

      - name: CodeQL Analysis
        uses: ./.github/actions/scan-with-codeql
        with:
          java-version: 17
          maven-version: ${{ env.MAVEN_VERSION }}
