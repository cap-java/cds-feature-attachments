name: Reusable Workflow

env:
  MAVEN_VERSION: "3.9.16"

on:
  workflow_call:

jobs:
  spotless:
    name: Spotless Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: "21"
          distribution: sapmachine
          cache: maven

      - name: Set up Maven
        uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
        with:
          maven-version: ${{ env.MAVEN_VERSION }}

      - name: Spotless Check
        run: mvn spotless:check -Dspotless.check.skip=false -B -ntp

  tests:
    name: Tests (Java ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        java-version: [21, 25]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Java ${{ matrix.java-version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: sapmachine
          cache: maven

      - name: Set up Maven
        uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
        with:
          maven-version: ${{ env.MAVEN_VERSION }}

      - name: Install @sap/cds-dk
        run: npm i -g @sap/cds-dk@10.0.4
        shell: bash

      - name: Run Tests
        run: mvn test -ntp -B -P skip-integration-tests -Dcds.install-node.skip

  integration-tests:
    name: Integration Tests (Java ${{ matrix.java-version }}, ${{ matrix.auth-method }}, ${{ matrix.hyperscaler }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        java-version: [21, 25]
        auth-method: [basic, mtls]
        hyperscaler: [AWS, AZURE, GCP]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Bind CF Services
        uses: cap-java/cds-feature-attachments/.github/actions/cf-bind@main
        with:
          cf-api: ${{ secrets[format('CF_API_{0}', matrix.hyperscaler)] }}
          cf-username: ${{ secrets.CF_USERNAME }}
          cf-password: ${{ secrets.CF_PASSWORD }}
          cf-org: ${{ secrets[format('CF_ORG_{0}', matrix.hyperscaler)] }}
          cf-space: ${{ secrets[format('CF_SPACE_{0}', matrix.hyperscaler)] }}
          auth-method: ${{ matrix.auth-method }}

      - name: Integration Tests
        uses: cap-java/cds-feature-attachments/.github/actions/integration-tests@main
        with:
          java-version: ${{ matrix.java-version }}
          maven-version: ${{ env.MAVEN_VERSION }}

  sonarqube-scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Bind CF Services
        uses: cap-java/cds-feature-attachments/.github/actions/cf-bind@main
        with:
          cf-api: ${{ secrets.CF_API_AWS }}
          cf-username: ${{ secrets.CF_USERNAME }}
          cf-password: ${{ secrets.CF_PASSWORD }}
          cf-org: ${{ secrets.CF_ORG_AWS }}
          cf-space: ${{ secrets.CF_SPACE_AWS }}
          auth-method: basic

      - name: SonarQube Scan
        uses: cap-java/.github/actions/scan-with-sonar@main
        with:
          java-version: 21
          maven-version: ${{ env.MAVEN_VERSION }}
          sonarq-token: ${{ secrets.SONARQ_TOKEN }}
          sonar-project-key: cds-feature-attachments
          coverage-report-path: coverage-report/target/site/jacoco-aggregate/jacoco.xml
          build-script: mvn clean verify -ntp -B -Dcds.install-node.skip
          coverage-exclusions: >-
            cds-feature-attachments/src/test/**,cds-feature-attachments/src/gen/**,storage-targets/cds-feature-attachments-fs/src/test/**,storage-targets/cds-feature-attachments-oss/src/test/**

  codeql:
    name: CodeQL Analysis (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, actions]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: CodeQL Analysis
        uses: cap-java/.github/actions/scan-with-codeql@main
        with:
          java-version: 21
          maven-version: ${{ env.MAVEN_VERSION }}
          language: ${{ matrix.language }}
