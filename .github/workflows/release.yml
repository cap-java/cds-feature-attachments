name: Deploy to Maven Central

permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  MAVEN_VERSION: '3.9.12'

on:
  release:
    types: [ "released" ]

jobs:
  requires-approval:
    runs-on: ubuntu-latest
    name: "Waiting for release approval"
    environment: release-approval
    steps:
      - name: Approval Step
        run: echo "Release has been approved!"

  blackduck:
    needs: requires-approval
    name: Blackduck Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release-approval
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Scan With Black Duck
        uses: cap-java/cds-feature-attachments/.github/actions/scan-with-blackduck@main
        with:
          blackduck_token: ${{ secrets.BLACK_DUCK_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          maven-version: ${{ env.MAVEN_VERSION }}

  update-version:
    needs: requires-approval
    name: Update Version
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release-approval
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Update version
        uses: cap-java/cds-feature-attachments/.github/actions/newrelease@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
          maven-version: ${{ env.MAVEN_VERSION }}

      - name: Upload Changed Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: root-new-version
          path: .
          retention-days: 1

  build:
    name: Build and Sonar Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: update-version
    environment: release-approval
    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: root-new-version

      - name: Build
        uses: cap-java/cds-feature-attachments/.github/actions/build@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
          maven-version: ${{ env.MAVEN_VERSION }}

      - name: Sonar Scan
        uses: cap-java/cds-feature-attachments/.github/actions/scan-with-sonar@main
        with:
          java-version: ${{ env.JAVA_VERSION }}
          maven-version: ${{ env.MAVEN_VERSION }}
          sonarq-token: ${{ secrets.SONARQ_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Changed Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: root-build
          path: .
          retention-days: 1

  deploy:
    name: Deploy to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [blackduck, build]
    environment: release-approval
    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: root-build

      - name: Deploy
        uses: cap-java/cds-feature-attachments/.github/actions/deploy-release@main
        with:
          user: ${{ secrets.CENTRAL_REPOSITORY_USER }}
          password: ${{ secrets.CENTRAL_REPOSITORY_PASS }}
          pgp-pub-key: ${{ secrets.PGP_PUBKEY_ID }}
          pgp-private-key: ${{ secrets.PGP_PRIVATE_KEY }}
          pgp-passphrase: ${{ secrets.PGP_PASSPHRASE }}
          revision: ${{ github.event.release.tag_name }}
          maven-version: ${{ env.MAVEN_VERSION }}
