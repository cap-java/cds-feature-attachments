name: CI - MAIN

env:
  MAVEN_VERSION: "3.9.16"

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  blackduck:
    name: Blackduck Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Scan With Black Duck
        uses: cap-java/.github/actions/scan-with-blackduck@main
        with:
          blackduck_token: ${{ secrets.BLACK_DUCK_TOKEN }}
          maven-version: ${{ env.MAVEN_VERSION }}
          project-name: com.sap.cds.feature.attachments
          included-modules: cds-feature-attachments,cds-feature-attachments-oss,cds-feature-attachments-fs
          scan_mode: FULL

  build-and-test:
    uses: ./.github/workflows/pipeline.yml
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: read
    secrets: inherit
