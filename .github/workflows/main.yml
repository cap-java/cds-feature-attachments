name: CI - MAIN

env:
  MAVEN_VERSION: "3.9.12"

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  blackduck:
    name: Blackduck Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Scan With Black Duck
        uses: cap-java/.github/actions/scan-with-blackduck@296573b55e906f5c77a1855bcfe4285cbbc5cac4 #main
        with:
          blackduck_token: ${{ secrets.BLACK_DUCK_TOKEN }}
          maven-version: ${{ env.MAVEN_VERSION }}
          project-name: com.sap.cds.feature.attachments
          included-modules: cds-feature-attachments,cds-feature-attachments-oss,cds-feature-attachments-fs
          scan_mode: FULL

  build-and-test:
    uses: cap-java/cds-feature-attachments/.github/workflows/pipeline.yml@296573b55e906f5c77a1855bcfe4285cbbc5cac4 #main
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: read
    secrets: inherit
