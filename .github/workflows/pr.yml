name: CI - PR

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [reopened, synchronize, opened]

jobs:
  blackduck:
    name: Blackduck Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Scan With Black Duck
        uses: cap-java/.github/actions/scan-with-blackduck@main
        with:
          blackduck_token: ${{ secrets.BLACK_DUCK_TOKEN }}
          maven-version: ${{ env.MAVEN_VERSION }}
          project-name: com.sap.cds.feature.attachments
          included-modules: cds-feature-attachments,cds-feature-attachments-oss,cds-feature-attachments-fs
          scan_mode: RAPID
          rapid_compare_mode: BOM_COMPARE # PRs might only be blocked by things they introduce, not by pre-existing issues that could have appeared in the main branch in the meantime

  build-and-test:
    uses: cap-java/cds-feature-attachments/.github/workflows/pipeline.yml@main
    secrets: inherit
