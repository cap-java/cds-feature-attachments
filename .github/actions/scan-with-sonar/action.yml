name: Scan with SonarQube
description: Scans the project with SonarQube

inputs:
  sonarq-token:
    description: The token to use for SonarQube authentication
    required: true
  github-token:
    description: The token to use for GitHub authentication
    required: true
  java-version:
    description: The version of Java to use
    required: true
  maven-version:
    description: The version of Maven to use
    required: true

runs:
  using: composite

  steps:
    - name: Set up Java ${{inputs.java-version}}
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: ${{inputs.java-version}}
        distribution: sapmachine
        cache: maven

    - name: Set up Maven ${{inputs.maven-version}}
      uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
      with:
        maven-version: ${{inputs.maven-version}}

    - name: Get Revision
      id: get-revision
      run: |
        echo "REVISION=$(mvn help:evaluate -Dexpression=revision -q -DforceStdout)" >> $GITHUB_OUTPUT
      shell: bash

    - name: Build project for SonarQube scan
      run: |
        mvn clean verify -ntp -B
      shell: bash

    - name: Verify JaCoCo reports exist
      run: |
        echo "=== Checking JaCoCo reports ==="
        find . -name "jacoco.xml" -type f
        for module in cds-feature-attachments storage-targets/cds-feature-attachments-fs storage-targets/cds-feature-attachments-oss; do
          if [ -f "$module/target/site/jacoco/jacoco.xml" ]; then
            echo "Found: $module/target/site/jacoco/jacoco.xml"
          else
            echo "Missing: $module/target/site/jacoco/jacoco.xml"
          fi
        done
        if [ -f "coverage-report/target/site/jacoco-aggregate/jacoco.xml" ]; then
          echo "Found: coverage-report/target/site/jacoco-aggregate/jacoco.xml"
        else
          echo "Missing: coverage-report/target/site/jacoco-aggregate/jacoco.xml"
          exit 1
        fi
      shell: bash

    - name: SonarQube Scan
      run: >
        mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
        -Dsonar.host.url=https://sonar.tools.sap
        -Dsonar.token=${{ inputs.sonarq-token }}
        -Dsonar.projectKey=cds-feature-attachments
        -Dsonar.projectVersion=${{ steps.get-revision.outputs.REVISION }}
        -Dsonar.qualitygate.wait=true
        -Dsonar.java.source=17
        -Dsonar.exclusions=**/samples/**
        -Dsonar.coverage.jacoco.xmlReportPaths=${{ github.workspace }}/coverage-report/target/site/jacoco-aggregate/jacoco.xml
        -Dsonar.coverage.exclusions=cds-feature-attachments/src/test/**,cds-feature-attachments/src/gen/**,storage-targets/cds-feature-attachments-fs/src/test/**,storage-targets/cds-feature-attachments-oss/src/test/**
        -B -ntp
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
