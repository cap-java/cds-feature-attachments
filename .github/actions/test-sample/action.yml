name: 'Test Sample'
description: 'Compile sample and run tests'

inputs:
  java-version:
    description: The Java version the build shall run with.
    required: true
  maven-version:
    description: The Maven version the build shall run with.
    required: true

runs:
  using: 'composite'
  steps:
    - name: Set up Java ${{ inputs.java-version }}
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: ${{ inputs.java-version }}
        distribution: sapmachine
        cache: maven

    - name: Set up Maven ${{ inputs.maven-version }}
      uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
      with:
        maven-version: ${{ inputs.maven-version }}

    - name: Install attachment dependency
      shell: bash
      working-directory: ./
      run: mvn install

    - name: Compile sample
      shell: bash
      working-directory: samples/bookshop
      run: mvn compile test-compile -B -V

    - name: Run tests
      shell: bash
      working-directory: samples/bookshop
      run: mvn test
