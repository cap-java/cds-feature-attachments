name: Integration Tests
description: Run integration tests using Maven with cds bind for service bindings.

inputs:
  java-version:
    description: The Java version the build shall run with.
    required: true
  maven-version:
    description: The Maven version the build shall run with.
    required: true

runs:
  using: composite
  steps:
    - name: Set up Java ${{ inputs.java-version }}
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: ${{ inputs.java-version }}
        distribution: sapmachine
        cache: maven

    - name: Setup Maven ${{ inputs.maven-version }}
      uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
      with:
        maven-version: ${{ inputs.maven-version }}

    - name: Build dependencies for integration tests
      run: mvn clean install -ntp -B -pl cds-feature-attachments,storage-targets/cds-feature-attachments-fs,storage-targets/cds-feature-attachments-oss -am
      shell: bash

    - name: Integration Tests (build version)
      run: npx cds bind --exec -- mvn clean verify -ntp -B -f ../../integration-tests/pom.xml
      working-directory: integration-tests/mtx-local
      shell: bash

    - name: Integration Tests (latest CAP Java)
      run: npx cds bind --exec -- mvn verify -ntp -B -f ../../integration-tests/pom.xml -P latest-test-version
      working-directory: integration-tests/mtx-local
      shell: bash
